<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPC Soluciones · Formularios</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page-login">

  <div class="login-container">
    <div class="login-header">
      <div class="logo">
        <span class="logo-mpc">MPC</span>
        <span class="logo-sol">Soluciones</span>
      </div>
      <p class="login-subtitle">Portal de formularios internos</p>
    </div>

    <div class="login-card">
      <h2>Iniciar sesión</h2>
      <p>Ingresá con tu correo corporativo</p>

      <div id="login-error" class="alert alert-error" style="display:none"></div>

      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="nombre@empresa.com" autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-password">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="toggle-pass" onclick="togglePassword()" aria-label="Mostrar contraseña">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn btn-primary btn-full" id="btn-login" onclick="handleLogin()">
        <span id="btn-login-text">Ingresar</span>
        <span id="btn-login-loading" style="display:none">Ingresando...</span>
      </button>
    </div>

    <p class="login-footer">¿Problemas para ingresar? Contactá a RRHH</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorEl  = document.getElementById('login-error');
      const btnText  = document.getElementById('btn-login-text');
      const btnLoad  = document.getElementById('btn-login-loading');
      const btn      = document.getElementById('btn-login');

      errorEl.style.display = 'none';
      if (!email || !password) {
        errorEl.textContent = 'Completá todos los campos.';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btnText.style.display = 'none';
      btnLoad.style.display = 'inline';

      const result = await signIn(email, password);

      btn.disabled = false;
      btnText.style.display = 'inline';
      btnLoad.style.display = 'none';

      if (result.error) {
        errorEl.textContent = 'Email o contraseña incorrectos.';
        errorEl.style.display = 'block';
      } else {
        window.location.href = 'pages/formularios.html';
      }
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    // Si ya está logueado, redirigir
    checkSession().then(session => {
      if (session) window.location.href = 'pages/formularios.html';
    });
  </script>
</body>
</html>
